services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexusrecall
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexusrecall"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  nexus-recall-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nexus:nexus@postgres:5432/nexusrecall
      REDIS_URL: redis://redis:6379
      NEXUS_RECALL_API_PORT: "3200"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  harness:
    build:
      context: ./harness
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
      - "5173:5173"
    env_file: .env
    environment:
      NEXUS_RECALL_URL: http://nexus-recall-api:3200
      HARNESS_PORT: "3100"
    depends_on:
      - nexus-recall-api

volumes:
  pgdata:
